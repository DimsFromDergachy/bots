name: Deploy to Server

on:
  push:
    branches: [ main ]

env:
  TARGETARCH: amd64  # GitHub Actions runs on AMD64
  APP_FOLDER: ~/apps/bible-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      
        # TODO: Configure the app folder
      - name: Deploy with Docker
        run: |
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} '
            export TARGETARCH=${{ env.TARGETARCH }}

            # Create directory if it doesn't exist
            mkdir -p ${{ env.APP_FOLDER }}
            cd ${{ env.APP_FOLDER }}

            # Pull latest code (if git repo exists)
            if [ -d .git ]; then
                git fetch origin
                git reset origin/main --hard
                git clean -dfx
            else
                # First-time clone
                git clone https://github.com/DimsFromDergachy/bots.git .
            fi

            # Set up .env file!

            docker compose down
            docker compose up -d --build

            # Clean docker up
            #docker system prune -f
          '