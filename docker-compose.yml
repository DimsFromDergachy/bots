services:
  bible-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: bible-bot:latest
    container_name: bible-bot
    restart: unless-stopped
    
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Optional: Mount templates for hot-reload during development
      # - ./templates:/app/templates:ro
    
    environment:
      # Required
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_TARGET_CHAT_ID=${TELEGRAM_TARGET_CHAT_ID}
      - TELEGRAM_STORAGE_CHAT_ID=${TELEGRAM_STORAGE_CHAT_ID}
      
      # Optional (defaults shown)
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-in-production}
      - TZ=${TZ:-Europe/Moscow}
      
      # Database path (optional)
      - DB_PATH=${DB_PATH:-/app/data/bible.db}
    
    ports:
      # Bind to localhost only - use reverse proxy for external access
      - "127.0.0.1:8080:8080"
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 2m
      timeout: 3s
      retries: 3
      start_period: 10s
    
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - bible-bot-network

# Optional: Add Nginx reverse proxy for HTTPS
  # nginx:
  #   image: nginx:alpine
