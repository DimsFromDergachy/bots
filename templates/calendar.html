{{template "base.html" .}}

{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Bible Reading Calendar</h1>
    <a href="/admin/logout" class="text-gray-600 hover:text-gray-800">Logout</a>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{range $month := .Months}}
        {{if $month}}
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="bg-gray-50 px-4 py-2 border-b">
                <h2 class="font-semibold text-gray-700">{{$month}}</h2>
            </div>
            <div class="p-4">
                <div class="grid grid-cols-7 gap-1">
                    {{range index $.Calendar (len $.Calendar | add 1)}}
                        {{if .}}
                        <a href="/admin/edit/{{.Month}}/{{.Day}}" 
                           class="aspect-square flex items-center justify-center rounded 
                                  {{if .Text}}bg-green-100 hover:bg-green-200 text-green-800{{else}}bg-gray-50 hover:bg-gray-100 text-gray-600{{end}}
                                  text-sm font-medium transition">
                            {{.Day}}
                        </a>
                        {{end}}
                    {{end}}
                </div>
            </div>
        </div>
        {{end}}
    {{end}}
</div>
{{end}}
