{{template "base.html" .}}

{{define "content"}}
<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <a href="/admin/" class="text-blue-500 hover:text-blue-700">&larr; Back to Calendar</a>
    </div>
    
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6">
            Edit Message: {{.Month}}/{{.Day}}
        </h1>
        
        <form method="POST" action="/admin/edit/{{.Month}}/{{.Day}}">
            <div class="mb-6">
                <label class="block text-gray-700 mb-2 font-medium">Message Text</label>
                <textarea name="text" rows="6" 
                          class="w-full px-3 py-2 border rounded-lg font-mono"
                          placeholder="Enter the daily reading text...">{{if .Message}}{{.Message.Text}}{{end}}</textarea>
                <p class="text-sm text-gray-500 mt-1">HTML formatting is supported</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2 font-medium">Image</label>
                {{if .Message.ImageFileID}}
                <div class="mb-3">
                    <span class="inline-block bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm">
                        ✓ Image uploaded
                    </span>
                </div>
                {{end}}
                
                <div hx-post="/admin/upload/{{.Month}}/{{.Day}}" 
                     hx-encoding="multipart/form-data"
                     hx-trigger="change from:#image-input"
                     hx-indicator="#upload-spinner">
                    <input type="file" 
                           id="image-input"
                           name="image" 
                           accept="image/*"
                           class="block w-full text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-full file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-blue-50 file:text-blue-700
                                  hover:file:bg-blue-100">
                </div>
                <div id="upload-spinner" class="htmx-indicator text-sm text-gray-500 mt-2">
                    Uploading...
                </div>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" 
                        class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
                    Save Changes
                </button>
                <a href="/admin/" 
                   class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
.htmx-indicator {
    display: none;
}
.htmx-request .htmx-indicator {
    display: inline;
}
.htmx-request.htmx-indicator {
    display: inline;
}
</style>
{{end}}
